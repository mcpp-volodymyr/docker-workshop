name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Format, lint, tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: session-2/app

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: session-2/app/requirements.txt

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev tools
        run: |
          pip install black flake8 pytest

      - name: Check formatting
        run: black --check .

      - name: Run linter
        run: flake8 .

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t web-poll:${{ github.sha }} ./session-2/app

